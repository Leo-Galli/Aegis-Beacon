; ==============================================================================
;  Aegis-Beacon v5.4 — PlatformIO Configuration
;  Target: ESP32 DevKit V1 (30-pin, Espressif ESP32-WROOM-32)
;  Radio:  Ebyte E22-400M30S (SX1262 / LLCC68)
;  Display: SSD1309 2.42" 128×64 OLED (software SPI, U8g2)
;  GPS:    NEO-6M (UART2)
;  Repo:   https://github.com/Leo-Galli/Aegis-Beacon
; ==============================================================================

[platformio]
default_envs = esp32devkitv1

; ── Primary build — 240 MHz (default, production) ────────────────────────────
[env:esp32devkitv1]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

lib_deps =
    jgromes/RadioLib         @ ^6.6.0
    bblanchon/ArduinoJson    @ ^7.0.0
    olikraus/U8g2            @ ^2.34.0
    mikalhart/TinyGPSPlus    @ ^1.0.3

build_flags =
    -DBOARD_HAS_PSRAM=0

board_build.flash_size    = 4MB
board_build.partitions    = default.csv
build_type                = release

; ── CI matrix build — 80 MHz (power-save test) ───────────────────────────────
[env:esp32devkitv1_80mhz]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

lib_deps =
    jgromes/RadioLib         @ ^6.6.0
    bblanchon/ArduinoJson    @ ^7.0.0
    olikraus/U8g2            @ ^2.34.0
    mikalhart/TinyGPSPlus    @ ^1.0.3

build_flags =
    -DBOARD_HAS_PSRAM=0
    -DBOARD_F_CPU=80000000L

board_build.f_cpu         = 80000000L
board_build.flash_size    = 4MB
board_build.partitions    = default.csv
build_type                = release