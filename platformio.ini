; ============================================================
; Aegis-Beacon PlatformIO Configuration
; Board: ESP32-C3 SuperMini / DevKitM-1
; ============================================================

[env:esp32-c3-supermin]
; Usiamo una versione stabile della piattaforma Espressif32
platform = espressif32 @ 6.7.0
board = esp32-c3-devkitm-1
framework = arduino

; Velocità della porta seriale per il monitoraggio
monitor_speed = 115200

; Impostazioni specifiche per ESP32-C3
; Forza l'output della Serial sulla USB integrata (fondamentale per ESP32-C3)
build_flags = 
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

; Librerie necessarie (PlatformIO le gestisce automaticamente)
lib_deps = 
    jgromes/RadioLib @ ^6.6.0
    bblanchon/ArduinoJson @ ^7.0.4
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit SSD1306 @ ^2.5.9
    adafruit/Adafruit BusIO @ ^1.16.1
    Wire

; Ottimizzazione e gestione build
build_type = release
board_build.partitions = huge_app.csv