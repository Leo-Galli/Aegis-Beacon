name: "Aegis-Beacon Ultra Suite"

on:
  push:
    branches: [ "main", "master" ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  build_and_test:
    name: Core Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout del codice
        uses: actions/checkout@v4

      - name: 2. Installazione PlatformIO
        run: pip install -U platformio

      - name: 3. Preparazione Struttura Progetto
        run: |
          mkdir -p src
          cp AegisBeacon.ino src/main.cpp
          echo "[env:esp32-c3-supermini]
          platform = espressif32
          board = esp32-c3-devkitm-1
          framework = arduino
          lib_deps = 
            jgromes/RadioLib @ ^6.6.0
            bblanchon/ArduinoJson @ ^7.0.4
            adafruit/Adafruit GFX Library @ ^1.11.9
            adafruit/Adafruit SSD1306 @ ^2.5.9" > platformio.ini

      - name: 4. Analisi Statica (Linting)
        run: |
          sudo apt-get update && sudo apt-get install -y cppcheck
          # Analisi che ignora i falsi positivi (unusedFunction, ecc)
          cppcheck --enable=warning,style --inline-suppr --suppress=unusedFunction --suppress=missingIncludeSystem src/main.cpp

      - name: 5. Compilazione Firmware
        run: pio run

      - name: 6. Archiviazione Binari
        uses: actions/upload-artifact@v4
        with:
          name: AegisBeacon-V4-Firmware
          path: .pio/build/*/firmware.bin

  release:
    name: Production Release
    needs: build_and_test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: AegisBeacon-V4-Firmware
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: firmware.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}