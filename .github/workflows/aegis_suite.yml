name: "🛡️ Aegis-Beacon Suite"

on:
  push:
    branches: [ "main", "master" ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  # ── Validation ──────────────────────────────────────────────────────────────
  validate:
    name: 🔍 Validate Project
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ✅ Check required files
        run: |
          for f in AegisBeacon.ino platformio.ini; do
            if [ ! -f "$f" ]; then
              echo "❌ Missing required file: $f"
              exit 1
            fi
          done
          echo "✅ All required files present"

      - name: 🔎 Validate platformio.ini
        run: |
          grep -q "esp32devkitv1" platformio.ini     || { echo "❌ Missing env:esp32devkitv1";      exit 1; }
          grep -q "RadioLib"      platformio.ini     || { echo "❌ Missing RadioLib dependency";    exit 1; }
          grep -q "U8g2"          platformio.ini     || { echo "❌ Missing U8g2 dependency";        exit 1; }
          grep -q "TinyGPSPlus"   platformio.ini     || { echo "❌ Missing TinyGPSPlus dependency"; exit 1; }
          echo "✅ platformio.ini looks correct"

  # ── Arduino IDE build — 240 MHz ─────────────────────────────────────────────
  build-arduino:
    name: 🔨 Arduino Build (240 MHz)
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🛠️ Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: 📦 Install ESP32 core + libraries
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32
          arduino-cli lib install \
            "RadioLib" \
            "ArduinoJson" \
            "U8g2" \
            "TinyGPSPlus"

      - name: 🏗️ Compile (ESP32 Dev Module, 240 MHz)
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32:CPUFreq=240 \
            --output-dir build-arduino \
            AegisBeacon.ino
          echo "✅ Arduino build succeeded"

      - name: 📦 Archive Arduino binary
        uses: actions/upload-artifact@v4
        with:
          name: AegisBeacon-v5.4-Arduino-240MHz
          path: build-arduino/*.bin

  # ── PlatformIO build — matrix (240 MHz + 80 MHz) ────────────────────────────
  build-pio:
    name: 🔧 PlatformIO Build (${{ matrix.env }})
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [ esp32devkitv1, esp32devkitv1_80mhz ]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🛠️ Install PlatformIO
        run: pip install -U platformio

      - name: 📁 Prepare source
        run: |
          mkdir -p src
          cp AegisBeacon.ino src/main.cpp

      - name: 🏗️ Compile (${{ matrix.env }})
        run: pio run -e ${{ matrix.env }}

      - name: 📦 Archive PlatformIO binary
        uses: actions/upload-artifact@v4
        with:
          name: AegisBeacon-v5.4-PIO-${{ matrix.env }}
          path: .pio/build/${{ matrix.env }}/firmware.bin

  # ── Static analysis ──────────────────────────────────────────────────────────
  static-analysis:
    name: 🛡️ Static Analysis + Size Report
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🛠️ Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck binutils
          pip install -U platformio

      - name: 📁 Prepare source
        run: |
          mkdir -p src
          cp AegisBeacon.ino src/main.cpp

      - name: 🔍 cppcheck
        run: |
          cppcheck \
            --enable=warning,style,performance,portability \
            --inline-suppr \
            --suppress=unusedFunction \
            --suppress=missingIncludeSystem \
            --suppress=noExplicitConstructor \
            --error-exitcode=1 \
            src/main.cpp
          echo "✅ cppcheck passed"

      - name: 📊 Flash / RAM size report
        id: size
        run: |
          pio run -e esp32devkitv1 2>&1 | tee pio_output.txt
          # Extract the RAM/Flash summary lines and expose them
          RAM=$(grep  "RAM:"   pio_output.txt | tail -1 || echo "n/a")
          FLASH=$(grep "Flash:" pio_output.txt | tail -1 || echo "n/a")
          echo "ram=$RAM"     >> $GITHUB_OUTPUT
          echo "flash=$FLASH" >> $GITHUB_OUTPUT
          echo "### 📊 Firmware Size" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`"              >> $GITHUB_STEP_SUMMARY
          echo "$RAM"                >> $GITHUB_STEP_SUMMARY
          echo "$FLASH"              >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`"              >> $GITHUB_STEP_SUMMARY

      - name: 💬 Post size comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const ram   = '${{ steps.size.outputs.ram }}';
            const flash = '${{ steps.size.outputs.flash }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body: `### 📊 Aegis-Beacon v5.4 — Firmware Size\n\`\`\`\n${ram}\n${flash}\n\`\`\``
            });

  # ── CI summary ───────────────────────────────────────────────────────────────
  notify:
    name: 📋 CI Summary
    needs: [ build-arduino, build-pio, static-analysis ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 📋 Write summary
        run: |
          echo "## 🛡️ Aegis-Beacon v5.4 — CI Results" >> $GITHUB_STEP_SUMMARY
          echo ""                                       >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |"                       >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|"                       >> $GITHUB_STEP_SUMMARY
          echo "| 🔨 Arduino 240MHz  | ${{ needs.build-arduino.result }}    |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔧 PIO 240MHz      | ${{ needs.build-pio.result }}        |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔧 PIO 80MHz       | ${{ needs.build-pio.result }}        |" >> $GITHUB_STEP_SUMMARY
          echo "| 🛡️ Static analysis | ${{ needs.static-analysis.result }} |" >> $GITHUB_STEP_SUMMARY

  # ── Release ──────────────────────────────────────────────────────────────────
  release:
    name: 🚀 Production Release
    needs: [ build-arduino, build-pio, static-analysis ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Download all firmware artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: AegisBeacon-v5.4-*
          merge-multiple: true
          path: release-bins

      - name: 📋 List binaries
        run: ls -lh release-bins/

      - name: 🏷️ Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-bins/*.bin
          body: |
            ## 🛡️ Aegis-Beacon ${{ github.ref_name }}

            ### Hardware target
            | Component | Part |
            |-----------|------|
            | MCU       | ESP32 DevKit V1 (30-pin) |
            | Radio     | Ebyte E22-400M30S (SX1262, +30 dBm) |
            | Display   | SSD1309 2.42″ OLED (U8g2, software SPI) |
            | GPS       | NEO-6M (UART2) |

            ### Firmware variants included
            | File | Build |
            |------|-------|
            | `firmware.bin` (240 MHz) | PlatformIO `esp32devkitv1` |
            | `firmware.bin` (80 MHz)  | PlatformIO `esp32devkitv1_80mhz` |
            | `*.bin` (Arduino IDE)    | Arduino CLI, ESP32 Dev Module |

            > ⚠️ v5.x is a **full hardware revision** from v4.0. Factory reset required when upgrading.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}