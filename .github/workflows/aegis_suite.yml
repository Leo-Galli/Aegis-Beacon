name: "🛡️ Aegis-Beacon Suite"

on:
  push:
    branches: [ "main", "master" ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  # ── Validation ──────────────────────────────────────────────────────────────
  validate:
    name: 🔍 Validate Project
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ✅ Check required files
        run: |
          for f in AegisBeacon.ino platformio.ini; do
            if [ ! -f "$f" ]; then
              echo "❌ Missing required file: $f"
              exit 1
            fi
          done
          echo "✅ All required files present"

      - name: 🔎 Validate platformio.ini
        run: |
          grep -q "esp32devkitv1" platformio.ini     || { echo "❌ Missing env:esp32devkitv1";      exit 1; }
          grep -q "RadioLib"      platformio.ini     || { echo "❌ Missing RadioLib dependency";    exit 1; }
          grep -q "U8g2"          platformio.ini     || { echo "❌ Missing U8g2 dependency";        exit 1; }
          grep -q "TinyGPSPlus"   platformio.ini     || { echo "❌ Missing TinyGPSPlus dependency"; exit 1; }
          echo "✅ platformio.ini looks correct"

  # ── Arduino IDE build — 240 MHz ─────────────────────────────────────────────
  build-arduino:
    name: 🔨 Arduino Build (240 MHz)
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🛠️ Install arduino-cli
        run: |
          # Download the official binary — avoids PATH issues with install.sh
          ARDUINO_CLI_VERSION="1.0.4"
          curl -fsSL \
            "https://github.com/arduino/arduino-cli/releases/download/v${ARDUINO_CLI_VERSION}/arduino-cli_${ARDUINO_CLI_VERSION}_Linux_64bit.tar.gz" \
            | tar -xz -C /usr/local/bin arduino-cli
          arduino-cli version

      - name: 📦 Install ESP32 core
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32
          echo "✅ ESP32 core installed"

      - name: 📦 Install libraries
        run: |
          arduino-cli lib install \
            "RadioLib" \
            "ArduinoJson" \
            "U8g2" \
            "TinyGPSPlus"
          echo "✅ Libraries installed"

      - name: 🏗️ Compile (ESP32 Dev Module, 240 MHz)
        run: |
          # arduino-cli requires the .ino inside a folder matching the sketch
          # name exactly. The repo keeps AegisBeacon.ino at the root, so we
          # create the expected structure in /tmp before compiling.
          mkdir -p /tmp/sketch/AegisBeacon
          cp AegisBeacon.ino /tmp/sketch/AegisBeacon/AegisBeacon.ino
          arduino-cli compile \
            --fqbn esp32:esp32:esp32:CPUFreq=240 \
            --output-dir "$GITHUB_WORKSPACE/build-arduino" \
            /tmp/sketch/AegisBeacon
          echo "✅ Arduino build succeeded"

      - name: 📦 Archive Arduino binary
        uses: actions/upload-artifact@v4
        with:
          name: AegisBeacon-v5.4-Arduino-240MHz
          path: build-arduino/*.bin

  # ── PlatformIO build — matrix (240 MHz + 80 MHz) ────────────────────────────
  build-pio:
    name: 🔧 PlatformIO Build (${{ matrix.env }})
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [ esp32devkitv1, esp32devkitv1_80mhz ]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🛠️ Install PlatformIO
        run: pip install -U platformio

      - name: 📁 Prepare source
        run: |
          mkdir -p src
          cp AegisBeacon.ino src/main.cpp

      - name: 🏗️ Compile (${{ matrix.env }})
        run: pio run -e ${{ matrix.env }}

      - name: 📦 Archive PlatformIO binary
        uses: actions/upload-artifact@v4
        with:
          name: AegisBeacon-v5.4-PIO-${{ matrix.env }}
          path: .pio/build/${{ matrix.env }}/firmware.bin

  # ── Static analysis ──────────────────────────────────────────────────────────
  static-analysis:
    name: 🛡️ Static Analysis + Size Report
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🛠️ Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck
          pip install -U platformio

      - name: 📁 Prepare source
        run: |
          mkdir -p src
          cp AegisBeacon.ino src/main.cpp

      - name: 🔍 cppcheck
        run: |
          cppcheck \
            --enable=warning,style,performance,portability \
            --inline-suppr \
            --suppress=unusedFunction \
            --suppress=missingIncludeSystem \
            --suppress=noExplicitConstructor \
            --suppress=knownConditionTrueFalse \
            --suppress=invalidPrintfArgType_uint \
            --suppress=constVariableReference \
            --error-exitcode=1 \
            src/main.cpp
          echo "✅ cppcheck passed"

      - name: 📊 Flash / RAM size report
        id: size
        run: |
          pio run -e esp32devkitv1 2>&1 | tee pio_output.txt

          RAM_LINE=$(grep   -i "ram:"   pio_output.txt | tail -1 || echo "RAM:   n/a")
          FLASH_LINE=$(grep -i "flash:" pio_output.txt | tail -1 || echo "Flash: n/a")

          # Write to job summary
          {
            echo "### 📊 Firmware Size — esp32devkitv1 (240 MHz)"
            echo '```'
            echo "$RAM_LINE"
            echo "$FLASH_LINE"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

          # Persist to step outputs using heredoc syntax (safe for special chars)
          {
            echo "ram<<EOF"
            echo "$RAM_LINE"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          {
            echo "flash<<EOF"
            echo "$FLASH_LINE"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: 💬 Post size comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const ram   = `${{ steps.size.outputs.ram }}`;
            const flash = `${{ steps.size.outputs.flash }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '### 📊 Aegis-Beacon v5.4 — Firmware Size',
                '```',
                ram,
                flash,
                '```'
              ].join('\n')
            });

  # ── CI summary ───────────────────────────────────────────────────────────────
  notify:
    name: 📋 CI Summary
    needs: [ build-arduino, build-pio, static-analysis ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 📋 Write summary
        run: |
          {
            echo "## 🛡️ Aegis-Beacon v5.4 — CI Results"
            echo ""
            echo "| Job | Status |"
            echo "|-----|--------|"
            echo "| 🔨 Arduino 240 MHz   | ${{ needs.build-arduino.result }}   |"
            echo "| 🔧 PIO 240 MHz       | ${{ needs.build-pio.result }}       |"
            echo "| 🔧 PIO 80 MHz        | ${{ needs.build-pio.result }}       |"
            echo "| 🛡️ Static analysis   | ${{ needs.static-analysis.result }} |"
          } >> $GITHUB_STEP_SUMMARY

  # ── Release ──────────────────────────────────────────────────────────────────
  release:
    name: 🚀 Production Release
    needs: [ build-arduino, build-pio, static-analysis ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Download all firmware artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: AegisBeacon-v5.4-*
          merge-multiple: true
          path: release-bins

      - name: 📋 List binaries
        run: ls -lh release-bins/

      - name: 🏷️ Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-bins/*.bin
          body: |
            ## 🛡️ Aegis-Beacon ${{ github.ref_name }}

            ### Hardware target
            | Component | Part |
            |-----------|------|
            | MCU       | ESP32 DevKit V1 (30-pin) |
            | Radio     | Ebyte E22-400M30S (SX1262, +30 dBm) |
            | Display   | SSD1309 2.42″ OLED (U8g2, software SPI) |
            | GPS       | NEO-6M (UART2) |
            | Battery   | TP4056 + 100kΩ divider on GPIO36 |

            ### Firmware variants included
            | Artifact | Build tool | CPU |
            |----------|-----------|-----|
            | PIO `esp32devkitv1`       | PlatformIO | 240 MHz |
            | PIO `esp32devkitv1_80mhz` | PlatformIO | 80 MHz  |
            | Arduino CLI               | arduino-cli | 240 MHz |

            > ⚠️ v5.x is a **full hardware revision** from v4.0 (ESP32-C3 → DevKit V1, SX1276 → SX1262, SSD1306 → SSD1309). Factory reset required when upgrading.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}