name: C Syntax Check

on:
  push:
    paths:
      - '**.ino'
      - '**.cpp'
      - '**.h'
      - '.github/workflows/c-syntax-check.yml'
  pull_request:
  workflow_dispatch:

jobs:
  cppcheck:
    name: cppcheck analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck
      - name: Run cppcheck
        run: |
          cppcheck --language=c++ --std=c++17 \
            --enable=warning,performance,portability \
            --suppress=missingIncludeSystem --suppress=unusedFunction \
            --suppress=missingInclude --inline-suppr \
            --error-exitcode=1 AegisBeacon.ino

  gcc-syntax:
    name: GCC Full Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare Complete Stubs
        run: |
          mkdir -p /tmp/stubs
          
          # --- Arduino.h Integrato ---
          cat > /tmp/stubs/Arduino.h << 'STUB'
          #pragma once
          #include <stdint.h>
          #include <stddef.h>
          #include <string.h>
          #include <stdlib.h>
          #include <stdio.h>
          #include <ctype.h>
          
          typedef bool boolean;
          typedef uint8_t byte;
          #define HIGH 0x1
          #define LOW  0x0
          #define INPUT_PULLUP 0x2
          #define OUTPUT 0x3
          #define PROGMEM
          #define RTC_DATA_ATTR
          
          struct String {
            String() {}
            String(const char* s) {}
            String(int v, int base=10) {}
            String(unsigned long v) {}
            String(float v, int dec=2) {}
            const char* c_str() const { return ""; }
            int length() const { return 0; }
            void operator+=(const char* s) {}
            void operator+=(String s) {}
            String operator+(const char* s) const { return *this; }
            String operator+(String s) const { return *this; }
          };
          inline String operator+(const char* a, const String& b) { return String(); }

          struct HardwareSerial {
            void begin(unsigned long) {}
            void printf(const char* f, ...) {}
            void flush() {}
          };
          extern HardwareSerial Serial;

          void delay(unsigned long);
          unsigned long millis();
          void pinMode(uint8_t, uint8_t);
          void digitalWrite(uint8_t, uint8_t);
          int digitalRead(uint8_t);
          void yield();
          
          #define HSPI 2
          struct EspClass { 
            void restart() {} 
            uint32_t getFreeHeap() { return 0; }
            uint32_t getFlashChipSize() { return 0; }
          };
          extern EspClass ESP;
          
          void btStop();
          int getCpuFrequencyMhz();
          int esp_reset_reason();
          void esp_deep_sleep(uint64_t);
          uint32_t uxTaskGetStackHighWaterMark(void*);
          template<typename T> T constrain(T x, T a, T b) { return x; }
          size_t strlen_P(const char* s) { return strlen(s); }

          struct IPAddress { IPAddress(int a, int b, int c, int d) {} };
          STUB

          # --- RadioLib.h ---
          cat > /tmp/stubs/RadioLib.h << 'STUB'
          #pragma once
          #include "Arduino.h"
          struct SPIClass { void begin(int s, int m, int o, int c) {} };
          #define RADIOLIB_NC -1
          #define RADIOLIB_ERR_NONE 0
          struct Module { Module(int c, int i, int r, int g, SPIClass& s) {} };
          struct SX1276 {
            SX1276(Module* m) {}
            int beginFSK(float f, float b, float d, float r, int8_t p, int pr, bool o) { return 0; }
            void setOOK(bool e) {}
            void setOutputPower(int8_t p) {}
            int transmitDirect() { return 0; }
            void standby() {}
            void sleep() {}
          };
          STUB

          # --- WiFi, WebServer, DNS, Preferences, Json ---
          cat > /tmp/stubs/WiFi.h << 'STUB'
          #define WIFI_AP 1
          #define WIFI_OFF 0
          struct { void mode(int m) {}; void softAP(const char* s) {}; void softAPConfig(...){}; int softAPgetStationNum(){return 0;} } WiFi;
          STUB
          
          cat > /tmp/stubs/WebServer.h << 'STUB'
          #define HTTP_GET 0
          #define HTTP_POST 1
          struct WebServer { 
            WebServer(int p) {}
            void on(const char* u, int m, void (*f)()) {}
            void onNotFound(void (*f)()) {}
            void begin() {}
            void handleClient() {}
            void send(int c, const char* t, String b) {}
            void send_P(int c, const char* t, const char* b) {}
            void sendHeader(const char* n, String v, bool f=false) {}
            bool hasArg(const char* n) { return false; }
            String arg(const char* n) { return ""; }
            String uri() { return ""; }
          };
          STUB

          echo 'struct DNSServer { void start(...) {}; void processNextRequest() {}; };' > /tmp/stubs/DNSServer.h
          
          cat > /tmp/stubs/Preferences.h << 'STUB'
          struct Preferences {
            void begin(const char* n, bool b) {}
            void end() {}
            uint8_t getUChar(const char* k, uint8_t d) { return 0; }
            float getFloat(const char* k, float d) { return 0; }
            void getString(const char* k, char* b, int l) {}
            int8_t getChar(const char* k, int8_t d) { return 0; }
            uint32_t getULong(const char* k, uint32_t d) { return 0; }
            void putUChar(...) {}
            void putFloat(...) {}
            void putString(...) {}
            void putChar(...) {}
            void putULong(...) {}
          };
          STUB

          cat > /tmp/stubs/ArduinoJson.h << 'STUB'
          template<int N> struct StaticJsonDocument { 
            struct Proxy { 
              template<typename T> T as() { return T(); } 
              operator int() { return 0; }
              operator const char*() { return ""; }
              const char* operator|(const char* d) { return d; }
            };
            Proxy operator[](const char* k) { return Proxy(); }
          };
          struct JsonArray { float* begin() { return nullptr; } float* end() { return nullptr; } };
          struct DeserializationError { operator bool() { return false; } };
          template<typename T, typename S> DeserializationError deserializeJson(T& d, S& s) { return DeserializationError(); }
          STUB

      - name: Run G++ Check
        run: |
          g++ -fsyntax-only -std=c++17 -w -x c++ \
            -I /tmp/stubs \
            -DESP32 -DCONFIG_IDF_TARGET_ESP32C3 \
            AegisBeacon.ino
          echo "✅ All syntax errors resolved."