name: C Syntax Check

# ──────────────────────────────────────────────────────────────────────────────
# Aegis-Beacon — C/C++ Syntax Validation
#
# Runs on every push and pull request that touches the firmware source.
# Uses two independent checks:
#   1. cppcheck  — static analysis (undefined behaviour, bad API use, style)
#   2. gcc -fsyntax-only — pure C/C++ syntax parse with Arduino stubs
#
# Badge URL (replace <owner>/<repo> with your GitHub path):
#   https://img.shields.io/github/actions/workflow/status/<owner>/<repo>/c-syntax-check.yml?branch=main&label=C%20Syntax%20Check&logo=github
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    paths:
      - '**.ino'
      - '**.cpp'
      - '**.h'
      - '.github/workflows/c-syntax-check.yml'
  pull_request:
    paths:
      - '**.ino'
      - '**.cpp'
      - '**.h'
      - '.github/workflows/c-syntax-check.yml'
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # Job 1 — cppcheck static analysis
  # ────────────────────────────────────────────────────────────────────────────
  cppcheck:
    name: cppcheck static analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cppcheck

      - name: Run cppcheck on firmware
        run: |
          cppcheck \
            --language=c++ \
            --std=c++17 \
            --enable=warning,style,performance,portability \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --inline-suppr \
            --error-exitcode=1 \
            --template='{file}:{line}: [{severity}] {id} — {message}' \
            AegisBeacon.ino

      - name: Show cppcheck version
        if: always()
        run: cppcheck --version

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2 — GCC syntax-only parse with minimal Arduino/ESP32 stubs
  # Compiles the .ino as a plain .cpp file against a thin stub header
  # so the compiler can validate syntax without a full toolchain install.
  # ────────────────────────────────────────────────────────────────────────────
  gcc-syntax:
    name: GCC syntax-only parse
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GCC and G++
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc g++

      - name: Create Arduino/ESP32 stub header
        run: |
          mkdir -p /tmp/arduino_stubs
          cat > /tmp/arduino_stubs/Arduino.h << 'EOF'
          #pragma once
          #include <stdint.h>
          #include <stddef.h>
          #include <string.h>
          #include <stdio.h>
          #include <stdlib.h>
          #include <ctype.h>

          // ── Primitive types ───────────────────────────────────────────────
          typedef bool      boolean;
          typedef uint8_t   byte;
          typedef uint16_t  word;

          // ── String class stub ─────────────────────────────────────────────
          struct String {
            String() {}
            String(const char*) {}
            String(int, int = 10) {}
            String(float, int = 2) {}
            String(unsigned long) {}
            String& operator+=(const String&) { return *this; }
            String& operator+=(const char*) { return *this; }
            String  operator+(const String&) const { return *this; }
            String  operator+(const char*) const { return *this; }
            const char* c_str() const { return ""; }
            int   length() const { return 0; }
            bool  operator==(const String&) const { return false; }
          };

          // ── Serial stub ───────────────────────────────────────────────────
          struct SerialClass {
            void begin(int) {}
            void println() {}
            void println(const char*) {}
            void println(int) {}
            void printf(const char*, ...) {}
            void flush() {}
          };
          extern SerialClass Serial;

          // ── Arduino functions ─────────────────────────────────────────────
          void     delay(unsigned long ms);
          unsigned long millis();
          unsigned long micros();
          void     pinMode(uint8_t, uint8_t);
          void     digitalWrite(uint8_t, uint8_t);
          int      digitalRead(uint8_t);
          void     yield();

          #define INPUT         0
          #define OUTPUT        1
          #define INPUT_PULLUP  2
          #define HIGH          1
          #define LOW           0

          // ── ESP32 specific stubs ──────────────────────────────────────────
          #define RTC_DATA_ATTR __attribute__((section(".rtc.data")))
          #define PROGMEM

          typedef enum { ESP_RST_UNKNOWN } esp_reset_reason_t;
          esp_reset_reason_t esp_reset_reason();
          void esp_deep_sleep(uint64_t time_in_us);

          struct EspClass {
            void     restart();
            uint32_t getFreeHeap();
            uint32_t getFlashChipSize();
          };
          extern EspClass ESP;

          int  getCpuFrequencyMhz();
          void btStop();

          uint32_t uxTaskGetStackHighWaterMark(void*);

          // ── IPAddress stub ────────────────────────────────────────────────
          struct IPAddress {
            IPAddress() {}
            IPAddress(uint8_t, uint8_t, uint8_t, uint8_t) {}
          };

          // ── toupper / millis already available via C includes ─────────────
          EOF

      - name: Create WiFi/DNS/WebServer/Preferences stubs
        run: |
          cat > /tmp/arduino_stubs/WiFi.h << 'EOF'
          #pragma once
          #include "Arduino.h"
          #define WIFI_OFF  0
          #define WIFI_AP   2
          struct WiFiClass {
            void mode(int) {}
            void softAP(const char*) {}
            void softAPConfig(IPAddress, IPAddress, IPAddress) {}
            int  softAPgetStationNum() { return 0; }
          };
          extern WiFiClass WiFi;
          EOF

          cat > /tmp/arduino_stubs/DNSServer.h << 'EOF'
          #pragma once
          #include "Arduino.h"
          struct DNSServer {
            void start(int, const char*, IPAddress) {}
            void processNextRequest() {}
          };
          EOF

          cat > /tmp/arduino_stubs/WebServer.h << 'EOF'
          #pragma once
          #include "Arduino.h"
          #define HTTP_GET  0
          #define HTTP_POST 1
          struct WebServer {
            WebServer(int) {}
            void on(const char*, int, void(*)()) {}
            void onNotFound(void(*)()) {}
            void begin() {}
            void handleClient() {}
            void send(int, const char*, const char*) {}
            void send_P(int, const char*, const char*) {}
            void sendHeader(const char*, String, bool = false) {}
            bool hasArg(const char*) { return false; }
            String arg(const char*) { return String(); }
            String uri() { return String(); }
          };
          EOF

          cat > /tmp/arduino_stubs/Preferences.h << 'EOF'
          #pragma once
          #include "Arduino.h"
          struct Preferences {
            void   begin(const char*, bool = false) {}
            void   end() {}
            uint8_t getUChar(const char*, uint8_t = 0) { return 0; }
            float   getFloat(const char*, float = 0) { return 0; }
            void    getString(const char*, char*, size_t) {}
            int8_t  getChar(const char*, int8_t = 0) { return 0; }
            uint32_t getULong(const char*, uint32_t = 0) { return 0; }
            void   putUChar(const char*, uint8_t) {}
            void   putFloat(const char*, float) {}
            void   putString(const char*, const char*) {}
            void   putChar(const char*, char) {}
            void   putULong(const char*, uint32_t) {}
          };
          EOF

      - name: Create RadioLib stub
        run: |
          cat > /tmp/arduino_stubs/RadioLib.h << 'EOF'
          #pragma once
          #include "Arduino.h"
          #define RADIOLIB_ERR_NONE  0
          #define RADIOLIB_NC       -1
          struct Module {
            Module(int, int, int, int, ...) {}
            Module(int, int, int, int, void&) {}
          };
          struct SPIClass {
            SPIClass(int) {}
            void begin(int, int, int, int) {}
          };
          struct SX1276 {
            SX1276(Module) {}
            SX1276(Module*) {}
            int  beginFSK(float, float, float, float, int8_t, int, bool) { return 0; }
            int  setOOK(bool) { return 0; }
            int  setOutputPower(int8_t) { return 0; }
            int  transmitDirect() { return 0; }
            int  standby() { return 0; }
            int  sleep() { return 0; }
            int  setFrequency(float) { return 0; }
          };
          EOF

          cat > /tmp/arduino_stubs/ArduinoJson.h << 'EOF'
          #pragma once
          #include "Arduino.h"
          struct DeserializationError {
            bool operator!() { return true; }
            const char* c_str() { return ""; }
            explicit operator bool() { return false; }
          };
          struct JsonArray {
            struct iterator { float operator*() { return 0; } iterator& operator++() { return *this; } bool operator!=(const iterator&) { return false; } };
            iterator begin() { return {}; }
            iterator end()   { return {}; }
          };
          template<size_t N>
          struct StaticJsonDocument {
            JsonArray as_array;
            JsonArray operator[](const char*) { return {}; }
            template<typename T> T operator|(T def) { return def; }
            DeserializationError deserialize(const String&) { return {}; }
          };
          DeserializationError deserializeJson(StaticJsonDocument<1024>&, const String&);
          template<size_t N> JsonArray getArray(StaticJsonDocument<N>&) { return {}; }
          EOF

      - name: Compile .ino as C++ with stubs (syntax-only)
        run: |
          g++ -fsyntax-only \
            -std=c++17 \
            -w \
            -x c++ \
            -I /tmp/arduino_stubs \
            -DARDUINO=10819 \
            -DESP32 \
            -DCONFIG_IDF_TARGET_ESP32C3 \
            AegisBeacon.ino
          echo "✅ Syntax check passed"

  # ────────────────────────────────────────────────────────────────────────────
  # Job 3 — arduino-lint (official Arduino linter)
  # Checks sketch structure, library.properties format, and naming conventions.
  # ────────────────────────────────────────────────────────────────────────────
  arduino-lint:
    name: arduino-lint sketch check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run arduino-lint
        uses: arduino/arduino-lint-action@v1
        with:
          path: .
          library-manager: false
          compliance: permissive
          project-type: sketch

  # ────────────────────────────────────────────────────────────────────────────
  # Summary job — fails the whole workflow if any check job failed
  # ────────────────────────────────────────────────────────────────────────────
  all-checks-pass:
    name: All syntax checks passed
    runs-on: ubuntu-latest
    needs: [cppcheck, gcc-syntax, arduino-lint]
    if: always()

    steps:
      - name: Check all jobs succeeded
        run: |
          if [ "${{ needs.cppcheck.result }}" != "success" ]; then
            echo "❌ cppcheck failed"
            exit 1
          fi
          if [ "${{ needs.gcc-syntax.result }}" != "success" ]; then
            echo "❌ gcc syntax-only check failed"
            exit 1
          fi
          if [ "${{ needs.arduino-lint.result }}" != "success" ]; then
            echo "❌ arduino-lint failed"
            exit 1
          fi
          echo "✅ All C syntax and lint checks passed"