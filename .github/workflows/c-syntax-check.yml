name: C Syntax Check

# ──────────────────────────────────────────────────────────────────────────────
# Aegis-Beacon — C/C++ Syntax Validation
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    paths:
      - '**.ino'
      - '**.cpp'
      - '**.h'
      - '.github/workflows/c-syntax-check.yml'
  pull_request:
    paths:
      - '**.ino'
      - '**.cpp'
      - '**.h'
      - '.github/workflows/c-syntax-check.yml'
  workflow_dispatch:

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # Job 1 — cppcheck (Analisi Statica)
  # ────────────────────────────────────────────────────────────────────────────
  cppcheck:
    name: cppcheck static analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          # Abbiamo rimosso 'style' dalle abilitazioni per evitare che il build 
          # fallisca per variabili inutilizzate (unreadVariable).
          cppcheck \
            --language=c++ \
            --std=c++17 \
            --enable=warning,performance,portability \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --suppress=missingInclude \
            --inline-suppr \
            --error-exitcode=1 \
            --template='{file}:{line}: [{severity}] {id} — {message}' \
            AegisBeacon.ino

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2 — GCC (Controllo Sintassi con Stub corretti)
  # ────────────────────────────────────────────────────────────────────────────
  gcc-syntax:
    name: GCC syntax-only parse
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install G++
        run: sudo apt-get install -y g++

      - name: Prepare Stubs
        run: |
          mkdir -p /tmp/stubs
          
          # --- Arduino.h ---
          cat > /tmp/stubs/Arduino.h << 'STUB'
          #pragma once
          #include <stdint.h>
          #include <stddef.h>
          #include <string.h>
          #include <stdlib.h>
          typedef bool boolean;
          typedef uint8_t byte;
          struct String {
            String() {}
            String(const char* s) {}
            String(int v, int base=10) {}
            const char* c_str() const { return ""; }
            bool operator==(const char* r) const { return false; }
          };
          struct HardwareSerial {
            void begin(unsigned long) {}
            void print(const char*) {}
            void println(const char* s="") {}
            void printf(const char* f, ...) {}
          };
          extern HardwareSerial Serial;
          void delay(unsigned long);
          unsigned long millis();
          void pinMode(uint8_t, uint8_t);
          void digitalWrite(uint8_t, uint8_t);
          int digitalRead(uint8_t);
          #define OUTPUT 1
          #define INPUT_PULLUP 2
          #define LOW 0
          #define HIGH 1
          #define HSPI 2
          #define RTC_DATA_ATTR
          struct EspClass { void restart() {} };
          extern EspClass ESP;
          void btStop() {}
          STUB

          # --- RadioLib.h (FIXED STUB) ---
          cat > /tmp/stubs/RadioLib.h << 'STUB'
          #pragma once
          #include "Arduino.h"
          struct SPIClass { void begin(int s, int m, int o, int c) {} };
          #define RADIOLIB_NC -1
          #define RADIOLIB_ERR_NONE 0
          struct Module {
            Module(int cs, int irq, int rst, int gpio, SPIClass& spi) {}
          };
          struct SX1276 {
            // Accetta un puntatore a Module, correggendo l'errore precedente
            SX1276(Module* mod) {} 
            int beginFSK(float f, float b, float d, float r, int8_t p, int pr, bool o) { return 0; }
            void setOOK(bool e) {}
            void setOutputPower(int8_t p) {}
            int transmitDirect() { return 0; }
            void standby() {}
            void sleep() {}
          };
          STUB

          # --- Other Stubs (Empty) ---
          touch /tmp/stubs/WiFi.h /tmp/stubs/Preferences.h /tmp/stubs/DNSServer.h /tmp/stubs/WebServer.h /tmp/stubs/ArduinoJson.h

      - name: Compile Check
        run: |
          g++ -fsyntax-only -std=c++17 -w -x c++ \
            -I /tmp/stubs \
            -DESP32 -DCONFIG_IDF_TARGET_ESP32C3 \
            AegisBeacon.ino
          echo "✅ Syntax check passed"

  # ────────────────────────────────────────────────────────────────────────────
  # Job 3 — Arduino Lint
  # ────────────────────────────────────────────────────────────────────────────
  arduino-lint:
    name: arduino-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/arduino-lint-action@v1
        with:
          compliance: permissive

  # ────────────────────────────────────────────────────────────────────────────
  # Summary
  # ────────────────────────────────────────────────────────────────────────────
  summary:
    runs-on: ubuntu-latest
    needs: [cppcheck, gcc-syntax, arduino-lint]
    if: always()
    steps:
      - name: Final Result
        run: |
          if [[ "${{ needs.gcc-syntax.result }}" == "success" ]]; then
            echo "All checks passed!"
          else
            echo "Checks failed."
            exit 1
          fi