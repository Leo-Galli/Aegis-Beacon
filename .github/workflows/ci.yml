# ============================================================
#  Aegis-Beacon CI/CD Pipeline
#  Workflow: .github/workflows/ci.yml
#
#  Triggers:
#    • Every push to main / develop
#    • Every pull request targeting main
#    • Manual dispatch (workflow_dispatch)
#    • Tag push v*.*.* → full release pipeline
#
#  Jobs:
#    1. validate       — YAML/JSON/Markdown lint
#    2. build-arduino  — Compile with arduino-cli (matrix: ESP32-C3)
#    3. build-pio      — Compile with PlatformIO
#    4. static-analysis— cppcheck static analysis on firmware
#    5. size-report    — Flash/RAM usage report as PR comment
#    6. release        — On tag: create GitHub Release + attach .bin
#    7. notify         — CI summary (always runs)
# ============================================================

name: CI — Build & Test

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "fix/**"
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      debug_build:
        description: "Enable verbose build output"
        required: false
        default: "false"
        type: boolean

# Cancel in-progress runs on the same branch/PR to save CI minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FIRMWARE_FILE: AegisBeacon.ino
  SKETCH_NAME:   AegisBeacon        # folder name = .ino name without extension
  ARDUINO_FQBN:  esp32:esp32:esp32c3
  PIO_ENV:       esp32-c3-supermin
  # Flash budget: warn if sketch exceeds this percentage of available flash
  FLASH_WARN_PCT: 80
  RAM_WARN_PCT:   70

# ============================================================
# JOB 1 — Lint & Validate
# ============================================================
jobs:
  validate:
    name: "🔍 Lint & Validate"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog generation

      - name: Setup Node.js (for markdown/YAML linting)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          #cache: "npm"

      - name: Install linters
        run: |
          npm install -g \
            markdownlint-cli@0.39.0 \
            js-yaml@4.1.0

      - name: Lint Markdown files
        run: |
          markdownlint \
            --config .markdownlint.json \
            README.md \
            DATASHEET.md \
            || true  # Non-blocking: report but don't fail on style issues

      - name: Validate workflow YAML syntax
        run: |
          for f in .github/workflows/*.yml; do
            echo "Validating $f"
            node -e "require('js-yaml').load(require('fs').readFileSync('$f','utf8'))" \
              && echo "  ✓ $f is valid YAML" \
              || (echo "  ✗ $f has YAML errors" && exit 1)
          done

      - name: Check firmware file exists
        run: |
          if [ ! -f "${{ env.FIRMWARE_FILE }}" ]; then
            echo "::error file=${{ env.FIRMWARE_FILE }}::Firmware file not found in repository root!"
            exit 1
          fi
          echo "✓ Firmware file found: ${{ env.FIRMWARE_FILE }}"
          wc -l "${{ env.FIRMWARE_FILE }}" | awk '{print "  Lines:", $1}'
          wc -c "${{ env.FIRMWARE_FILE }}" | awk '{print "  Bytes:", $1}'

      - name: Check required project files
        run: |
          REQUIRED=(
            "README.md"
            "DATASHEET.md"
            "LICENSE"
            "platformio.ini"
            ".github/workflows/ci.yml"
          )
          MISSING=0
          for f in "${REQUIRED[@]}"; do
            if [ -f "$f" ]; then
              echo "  ✓ $f"
            else
              echo "  ✗ MISSING: $f"
              MISSING=$((MISSING+1))
            fi
          done
          if [ $MISSING -gt 0 ]; then
            echo "::warning::$MISSING required file(s) missing. See list above."
          fi

      - name: Validate platformio.ini
        run: |
          if [ -f platformio.ini ]; then
            python3 -c "
          import configparser, sys
          c = configparser.ConfigParser()
          c.read('platformio.ini')
          envs = [s for s in c.sections() if s.startswith('env:')]
          print(f'  Found {len(envs)} PlatformIO environment(s): {envs}')
          for env in envs:
              if 'platform' not in c[env]:
                  print(f'  ERROR: {env} missing platform key')
                  sys.exit(1)
              if 'framework' not in c[env]:
                  print(f'  ERROR: {env} missing framework key')
                  sys.exit(1)
          print('  ✓ platformio.ini is valid')
          "
          else
            echo "::warning::platformio.ini not found — skipping validation"
          fi

# ============================================================
# JOB 2 — Build with Arduino CLI
# ============================================================
  build-arduino:
    name: "🔨 Arduino CLI Build"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: validate

    strategy:
      fail-fast: false
      matrix:
        include:
          - board_fqbn:  esp32:esp32:esp32c3
            board_name:  "ESP32-C3 DevKit"
            cpu_freq:    "160"
          - board_fqbn:  esp32:esp32:esp32c3
            board_name:  "ESP32-C3 SuperMini (safe)"
            cpu_freq:    "80"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Arduino CLI + libraries
        uses: actions/cache@v4
        with:
          path: |
            ~/.arduino15
            ~/Arduino/libraries
          key: arduino-${{ runner.os }}-${{ hashFiles('**/ci.yml') }}-v3
          restore-keys: |
            arduino-${{ runner.os }}-

      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Configure Arduino CLI
        run: |
          arduino-cli config init --overwrite
          arduino-cli config set board_manager.additional_urls \
            "https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json"

      - name: Install ESP32 Arduino core
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@3.0.2
          echo "Installed cores:"
          arduino-cli core list

      - name: Install firmware dependencies
        run: |
          echo "Installing RadioLib..."
          arduino-cli lib install "RadioLib@6.6.0"
          echo "Installing ArduinoJson..."
          arduino-cli lib install "ArduinoJson@7.0.4"
          echo "Installed libraries:"
          arduino-cli lib list

      - name: Prepare sketch directory
        # arduino-cli requires the .ino to be inside a folder with the SAME name.
        # The .ino lives in the repo root, so we create a sibling folder and copy it.
        run: |
          SKETCH_DIR="${{ env.SKETCH_NAME }}"
          mkdir -p "$SKETCH_DIR"
          cp "${{ env.FIRMWARE_FILE }}" "$SKETCH_DIR/"
          echo "✓ Sketch prepared at ./$SKETCH_DIR/${{ env.FIRMWARE_FILE }}"

      - name: Compile firmware (${{ matrix.board_name }})
        id: compile
        run: |
          VERBOSE_FLAG=""
          if [ "${{ github.event.inputs.debug_build }}" = "true" ]; then
            VERBOSE_FLAG="--verbose"
          fi

          arduino-cli compile \
            --fqbn "${{ matrix.board_fqbn }}" \
            --build-property "build.extra_flags=-DCPU_FREQ_MHZ=${{ matrix.cpu_freq }}" \
            --output-dir ./build_output \
            $VERBOSE_FLAG \
            "./${{ env.SKETCH_NAME }}" \
            2>&1 | tee build.log

          BUILD_EXIT=${PIPESTATUS[0]}

          if [ $BUILD_EXIT -ne 0 ]; then
            echo "::error::Compilation FAILED for ${{ matrix.board_name }}"
            grep -n "error:" build.log | while IFS=: read file line col msg; do
              echo "::error file=$file,line=$line::$msg"
            done
            exit 1
          fi

          echo "✓ Compilation succeeded for ${{ matrix.board_name }}"

      - name: Extract build size
        if: success()
        id: size
        run: |
          SKETCH_SIZE=$(grep -oP 'Sketch uses \K[0-9]+' build.log || echo "0")
          MAX_SKETCH=$(grep -oP 'Maximum is \K[0-9]+' build.log | head -1 || echo "1")
          GLOBAL_SIZE=$(grep -oP 'Global variables use \K[0-9]+' build.log || echo "0")
          MAX_GLOBAL=$(grep -oP 'Maximum is \K[0-9]+' build.log | tail -1 || echo "1")

          FLASH_PCT=$(( SKETCH_SIZE * 100 / MAX_SKETCH ))
          RAM_PCT=$(( GLOBAL_SIZE * 100 / MAX_GLOBAL ))

          echo "flash_bytes=$SKETCH_SIZE"  >> $GITHUB_OUTPUT
          echo "flash_max=$MAX_SKETCH"     >> $GITHUB_OUTPUT
          echo "flash_pct=$FLASH_PCT"      >> $GITHUB_OUTPUT
          echo "ram_bytes=$GLOBAL_SIZE"    >> $GITHUB_OUTPUT
          echo "ram_max=$MAX_GLOBAL"       >> $GITHUB_OUTPUT
          echo "ram_pct=$RAM_PCT"          >> $GITHUB_OUTPUT

          echo ""
          echo "═══════════════════════════════════════"
          echo "  BUILD SIZE REPORT — ${{ matrix.board_name }}"
          echo "═══════════════════════════════════════"
          printf "  Flash : %d / %d bytes  (%d%%)\n" $SKETCH_SIZE $MAX_SKETCH $FLASH_PCT
          printf "  RAM   : %d / %d bytes  (%d%%)\n" $GLOBAL_SIZE $MAX_GLOBAL $RAM_PCT
          echo "═══════════════════════════════════════"

          if [ $FLASH_PCT -gt ${{ env.FLASH_WARN_PCT }} ]; then
            echo "::warning::Flash usage $FLASH_PCT% exceeds warning threshold ${{ env.FLASH_WARN_PCT }}%"
          fi
          if [ $RAM_PCT -gt ${{ env.RAM_WARN_PCT }} ]; then
            echo "::warning::RAM usage $RAM_PCT% exceeds warning threshold ${{ env.RAM_WARN_PCT }}%"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "firmware-arduino-${{ matrix.cpu_freq }}mhz"
          path: |
            build_output/*.bin
            build_output/*.elf
            build.log
          retention-days: 30

      - name: Write size summary to job summary
        if: success()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🔨 Arduino Build — ${{ matrix.board_name }}

          | Metric | Used | Max | % |
          |--------|------|-----|---|
          | Flash  | ${{ steps.size.outputs.flash_bytes }} B | ${{ steps.size.outputs.flash_max }} B | ${{ steps.size.outputs.flash_pct }}% |
          | RAM    | ${{ steps.size.outputs.ram_bytes }} B | ${{ steps.size.outputs.ram_max }} B | ${{ steps.size.outputs.ram_pct }}% |

          EOF

# ============================================================
# JOB 3 — Build with PlatformIO
# ============================================================
  build-pio:
    name: "🔧 PlatformIO Build"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .pio
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}-v3
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install PlatformIO
        run: |
          pip install --upgrade platformio
          pio --version

      - name: Validate platformio.ini exists
        run: |
          if [ ! -f platformio.ini ]; then
            echo "::error::platformio.ini not found. Creating minimal version for CI..."
            cat > platformio.ini << 'PIOEOF'
          [env:esp32-c3-supermin]
          platform  = espressif32
          board     = esp32-c3-devkitm-1
          framework = arduino
          lib_deps  =
              jgromes/RadioLib @ ^6.6.0
              bblanchon/ArduinoJson @ ^7.0.0
          monitor_speed = 115200
          upload_speed  = 921600
          build_flags   =
              -DARDUINO_USB_MODE=1
              -DARDUINO_USB_CDC_ON_BOOT=1
          PIOEOF
            echo "::warning::Generated minimal platformio.ini for CI. Add one to your repo."
          fi
          echo "platformio.ini contents:"
          cat platformio.ini

      - name: Prepare sketch for PlatformIO
        # PlatformIO expects sources in src/. The .ino sits in the repo root.
        run: |
          mkdir -p src
          cp "${{ env.FIRMWARE_FILE }}" src/main.cpp
          echo "✓ Copied ${{ env.FIRMWARE_FILE }} → src/main.cpp"

      - name: Run PlatformIO build
        id: pio_build
        run: |
          pio run --environment "${{ env.PIO_ENV }}" \
            2>&1 | tee pio_build.log

          PIO_EXIT=${PIPESTATUS[0]}

          if [ $PIO_EXIT -ne 0 ]; then
            echo "::error::PlatformIO build FAILED"
            grep -E "error:|Error" pio_build.log | head -20
            exit 1
          fi
          echo "✓ PlatformIO build succeeded"

      - name: Extract PlatformIO size report
        if: success()
        run: |
          echo ""
          echo "═══════════════════════════════════════"
          echo "  PLATFORMIO SIZE REPORT"
          echo "═══════════════════════════════════════"
          grep -A5 "RAM:" pio_build.log | tail -10 || true
          grep -A5 "Flash:" pio_build.log | tail -10 || true
          echo "═══════════════════════════════════════"

      - name: Upload PlatformIO artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "firmware-platformio"
          path: |
            .pio/build/${{ env.PIO_ENV }}/*.bin
            .pio/build/${{ env.PIO_ENV }}/*.elf
            pio_build.log
          retention-days: 30

# ============================================================
# JOB 4 — Static Analysis (cppcheck)
# ============================================================
  static-analysis:
    name: "🛡️ Static Analysis"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cppcheck
          cppcheck --version

      - name: Run cppcheck on firmware
        id: cppcheck
        run: |
          cppcheck \
            --enable=warning,performance,portability,style \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --suppress=noExplicitConstructor \
            --inline-suppr \
            --language=c++ \
            --std=c++14 \
            --platform=unix32 \
            --template="{file}:{line}:{severity}:{id}: {message}" \
            --output-file=cppcheck_report.txt \
            "${{ env.FIRMWARE_FILE }}" \
            2>&1

          echo "cppcheck exit code: $?"

          ERRORS=$(grep -c ":error:"       cppcheck_report.txt 2>/dev/null || echo "0")
          WARNINGS=$(grep -c ":warning:"   cppcheck_report.txt 2>/dev/null || echo "0")
          STYLE=$(grep -c ":style:"        cppcheck_report.txt 2>/dev/null || echo "0")
          PERF=$(grep -c ":performance:"   cppcheck_report.txt 2>/dev/null || echo "0")

          echo ""
          echo "═══════════════════════════════════════"
          echo "  STATIC ANALYSIS REPORT"
          echo "  Errors:      $ERRORS"
          echo "  Warnings:    $WARNINGS"
          echo "  Style:       $STYLE"
          echo "  Performance: $PERF"
          echo "═══════════════════════════════════════"

          if [ -s cppcheck_report.txt ]; then
            echo ""
            echo "Issues found:"
            cat cppcheck_report.txt
          else
            echo "  ✓ No issues detected"
          fi

          echo "errors=$ERRORS"     >> $GITHUB_OUTPUT
          echo "warnings=$WARNINGS" >> $GITHUB_OUTPUT

          # Hard fail only on errors
          if [ "$ERRORS" -gt "0" ]; then
            echo "::error::cppcheck found $ERRORS error(s). Fix before merging."
            exit 1
          fi

          # Annotate warnings
          while IFS= read -r line; do
            if echo "$line" | grep -q ":warning:"; then
              FILE=$(echo "$line" | cut -d: -f1)
              LINENO=$(echo "$line" | cut -d: -f2)
              MSG=$(echo "$line" | cut -d: -f5-)
              echo "::warning file=$FILE,line=$LINENO::$MSG"
            fi
          done < cppcheck_report.txt

      - name: Upload cppcheck report
        uses: actions/upload-artifact@v4
        with:
          name: "static-analysis-report"
          path: cppcheck_report.txt
          retention-days: 30

      - name: Write analysis summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🛡️ Static Analysis Report

          | Severity | Count |
          |----------|-------|
          | ❌ Errors | ${{ steps.cppcheck.outputs.errors }} |
          | ⚠️ Warnings | ${{ steps.cppcheck.outputs.warnings }} |

          $([ -s cppcheck_report.txt ] && echo '```' && cat cppcheck_report.txt && echo '```' || echo '_No issues found ✓_')
          EOF

# ============================================================
# JOB 5 — Size Report as PR Comment
# ============================================================
  size-report:
    name: "📊 Size Report"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-arduino, build-pio]
    if: github.event_name == 'pull_request'

    permissions:
      pull-requests: write

    steps:
      - name: Download Arduino build artifacts
        uses: actions/download-artifact@v4
        with:
          name: "firmware-arduino-160mhz"
          path: ./artifacts/arduino

      - name: Download PlatformIO build artifacts
        uses: actions/download-artifact@v4
        with:
          name: "firmware-platformio"
          path: ./artifacts/pio

      - name: Extract size numbers and post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            function extractSize(logPath) {
              if (!fs.existsSync(logPath)) return null;
              const log = fs.readFileSync(logPath, 'utf8');
              const sketchMatch = log.match(/Sketch uses (\d+) bytes.*Maximum is (\d+)/);
              const globalMatch = log.match(/Global variables use (\d+) bytes.*Maximum is (\d+)/);
              if (!sketchMatch || !globalMatch) return null;
              return {
                flash:    parseInt(sketchMatch[1]),
                flashMax: parseInt(sketchMatch[2]),
                ram:      parseInt(globalMatch[1]),
                ramMax:   parseInt(globalMatch[2]),
              };
            }

            const arduino = extractSize('./artifacts/arduino/build.log');

            let body = `## 📊 Firmware Size Report\n\n`;
            body += `> Automatically generated for commit \`${context.sha.substring(0,7)}\`\n\n`;

            if (arduino) {
              const flashPct = ((arduino.flash / arduino.flashMax) * 100).toFixed(1);
              const ramPct   = ((arduino.ram   / arduino.ramMax)   * 100).toFixed(1);

              const flashBar = '█'.repeat(Math.round(flashPct/5)) + '░'.repeat(20-Math.round(flashPct/5));
              const ramBar   = '█'.repeat(Math.round(ramPct/5))   + '░'.repeat(20-Math.round(ramPct/5));

              body += `### Arduino CLI Build (ESP32-C3 @ 160 MHz)\n\n`;
              body += `| Resource | Used | Max | % | Bar |\n`;
              body += `|----------|------|-----|---|-----|\n`;
              body += `| 💾 Flash | ${arduino.flash.toLocaleString()} B | ${arduino.flashMax.toLocaleString()} B | ${flashPct}% | \`${flashBar}\` |\n`;
              body += `| 🧠 RAM   | ${arduino.ram.toLocaleString()} B | ${arduino.ramMax.toLocaleString()} B | ${ramPct}% | \`${ramBar}\` |\n`;

              if (parseFloat(flashPct) > 80) {
                body += `\n> ⚠️ **Flash usage above 80%** — consider optimising string literals with \`PROGMEM\`.\n`;
              }
              if (parseFloat(ramPct) > 70) {
                body += `\n> ⚠️ **RAM usage above 70%** — check for large stack allocations.\n`;
              }
            } else {
              body += `_Could not parse size data from build log._\n`;
            }

            body += `\n---\n*Generated by [Aegis-Beacon CI](${ context.payload.repository.html_url }/actions/runs/${ process.env.GITHUB_RUN_ID })*`;

            const comments = await github.rest.issues.listComments({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.data.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Firmware Size Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log('Updated existing size comment.');
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              console.log('Posted new size comment.');
            }

# ============================================================
# JOB 6 — Release (tags only: v*.*.*)
# ============================================================
  release:
    name: "🚀 Create Release"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-arduino, build-pio, static-analysis]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG"         >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT
          echo "Release version: $TAG"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release_assets

          find ./all-artifacts -name "*.bin" | while read f; do
            ARTIFACT_DIR=$(basename "$(dirname "$(dirname "$f")")")
            cp "$f" "release_assets/AegisBeacon_${{ steps.version.outputs.tag }}_${ARTIFACT_DIR}.bin"
          done

          git archive --format=zip --prefix="aegis-beacon-${{ steps.version.outputs.tag }}/" \
            HEAD -o "release_assets/AegisBeacon_${{ steps.version.outputs.tag }}_source.zip"

          echo "Release assets:"
          ls -lh release_assets/

      - name: Generate changelog from commits
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="$PREV_TAG..HEAD"
          else
            RANGE="HEAD"
          fi

          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "## Changes in ${{ steps.version.outputs.tag }}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          git log "$RANGE" --pretty=format:"- %s (%h)" --no-merges >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Aegis-Beacon ${{ steps.version.outputs.tag }}"
          body: |
            # Aegis-Beacon ${{ steps.version.outputs.tag }}

            ${{ steps.changelog.outputs.CHANGELOG }}

            ## 📦 Assets

            | File | Description |
            |------|-------------|
            | `*_arduino-160mhz.bin` | Pre-built firmware — Arduino CLI, ESP32-C3 @ 160 MHz |
            | `*_platformio.bin`     | Pre-built firmware — PlatformIO |
            | `*_source.zip`         | Full source archive |

            ## 🔌 Flash Instructions

            **esptool.py:**
            ```bash
            esptool.py --chip esp32c3 --port /dev/ttyUSB0 \
              --baud 921600 write_flash 0x0 AegisBeacon_${{ steps.version.outputs.tag }}_*.bin
            ```

            **PlatformIO:**
            ```bash
            pio run --target upload --environment esp32-c3-supermin
            ```

            > ⚠️ Always hold the BOOT button (GPIO9) when flashing via esptool if the device doesn't enter bootloader automatically.
          files: release_assets/*
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          generate_release_notes: false

# ============================================================
# JOB 7 — Notification summary (always runs)
# ============================================================
  notify:
    name: "📋 CI Summary"
    runs-on: ubuntu-latest
    needs: [validate, build-arduino, build-pio, static-analysis]
    if: always()

    steps:
      - name: Write final CI summary
        run: |
          VALIDATE="${{ needs.validate.result }}"
          ARDUINO="${{ needs.build-arduino.result }}"
          PIO="${{ needs.build-pio.result }}"
          ANALYSIS="${{ needs.static-analysis.result }}"

          status_emoji() {
            case "$1" in
              success)   echo "✅" ;;
              failure)   echo "❌" ;;
              skipped)   echo "⏭️" ;;
              cancelled) echo "🚫" ;;
              *)         echo "⚪" ;;
            esac
          }

          cat >> $GITHUB_STEP_SUMMARY << EOF
          # 🏔️ Aegis-Beacon CI Results

          | Job | Status |
          |-----|--------|
          | 🔍 Lint & Validate     | $(status_emoji $VALIDATE) $VALIDATE |
          | 🔨 Arduino CLI Build   | $(status_emoji $ARDUINO) $ARDUINO |
          | 🔧 PlatformIO Build    | $(status_emoji $PIO) $PIO |
          | 🛡️ Static Analysis     | $(status_emoji $ANALYSIS) $ANALYSIS |

          **Commit:** \`${{ github.sha }}\`
          **Branch:** \`${{ github.ref_name }}\`
          **Triggered by:** ${{ github.event_name }}
          **Actor:** @${{ github.actor }}

          EOF

          if [ "$ARDUINO" = "failure" ] || [ "$PIO" = "failure" ] || [ "$VALIDATE" = "failure" ]; then
            echo "> ❌ **Pipeline FAILED** — check the jobs above for details." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "> ✅ **Pipeline PASSED** — firmware is ready." >> $GITHUB_STEP_SUMMARY
          fi